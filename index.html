  <script>
    ////////////////////////////////////////////////
    // Pipeline修改的入参
    ////////////////////////////////////////////////
    const PARAM_DEFAULT_VERSION = '2.3.2';

    //////////////////////////////////////////////////////////
    // 根据版本号选择对应的 HTML 文件并加载
    //////////////////////////////////////////////////////////
    function loadCorrectIndexPage(version) {
      const targetIndexFile = `index.${version}.html`;
      if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        // iOS 使用 iframe.src 而非 iframe.srcdoc：
        // srcdoc 会产生 null origin，导致 Google OAuth popup 无法 postMessage 回调。
        // src 指向同域文件，iframe origin = playzone.cool，OAuth 通信正常。
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none';
        document.body.innerHTML = '';
        document.body.appendChild(iframe);
        iframe.src = targetIndexFile;
        return;
      }
      // 其他平台：fetch 后 document.write，避免地址栏跳转
      fetch(targetIndexFile)
        .then(response => response.text())
        .then(html => {
          try {
            document.open();
            document.write(html);
            document.close();
          } catch (error) {
            console.error('Error parsing HTML with DOMParser:', error);
            redirectToIndex(targetIndexFile);
          }
        })
        .catch(error => {
          console.error('Error fetching HTML file:', error);
          redirectToIndex(targetIndexFile);
        });
    }

    ////////////////////////////////////////////////
    // 使用DOMParser会有兼容问题，如报错，换回重定向方案
    ////////////////////////////////////////////////
    function redirectToIndex(targetIndexFile) {
      // console.log(`Redirecting to ${targetIndexFile}`);
      window.location.href = targetIndexFile;

      // const query = window.location.search || '';
      // console.log(`Redirecting to ${targetIndexFile}${query}`);
      // window.location.replace(`${targetIndexFile}${query}`);
    }

    ////////////////////////////////////////////////
    // 页面加载完成后，立即请求版本号
    ////////////////////////////////////////////////
    loadCorrectIndexPage(PARAM_DEFAULT_VERSION);
  </script>
